services:
  postgres:
    image: postgres:16-alpine
    container_name: bountive-postgres
    environment:
      POSTGRES_DB: bountive
      POSTGRES_USER: bountive
      POSTGRES_PASSWORD: bountive
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U bountive -d bountive"]
      interval: 5s
      timeout: 5s
      retries: 20

  redis:
    image: redis:7-alpine
    container_name: bountive-redis
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 20

  web:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: bountive-web
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      DATABASE_PROVIDER: postgresql
      DATABASE_URL: postgresql://bountive:bountive@postgres:5432/bountive?schema=public
      REDIS_URL: redis://redis:6379
      DEFAULT_MISSION_MODE: dry_run
      ENABLE_LIVE_SUBMISSIONS: "false"
      MISSION_WORKER_POLL_MS: "3000"
      MISSION_WORKER_LEASE_MS: "60000"
      MISSION_WORKER_CONCURRENCY: "2"
      NEXT_TELEMETRY_DISABLED: "1"
    ports:
      - "3000:3000"
    command: ["/bin/sh", "-lc", "npx prisma db push && npm run start"]

  worker:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: bountive-worker
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      DATABASE_PROVIDER: postgresql
      DATABASE_URL: postgresql://bountive:bountive@postgres:5432/bountive?schema=public
      REDIS_URL: redis://redis:6379
      DEFAULT_MISSION_MODE: dry_run
      ENABLE_LIVE_SUBMISSIONS: "false"
      MISSION_WORKER_POLL_MS: "3000"
      MISSION_WORKER_LEASE_MS: "60000"
      MISSION_WORKER_CONCURRENCY: "2"
      NEXT_TELEMETRY_DISABLED: "1"
    command: ["/bin/sh", "-lc", "npx prisma db push && npm run mission:worker"]

volumes:
  postgres-data:
  redis-data:
